name: Add linked issues

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  issues: read
  pull-requests: write

jobs:
  add-issue-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue references
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const originalBody = pr.body || "";

            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 20) {
                      nodes {
                        number
                        title
                        url
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: pr.number
            });

            const issues =
              result.repository.pullRequest.closingIssuesReferences.nodes;

            if (issues.length === 0) {
              core.info("No linked issues found");
              return;
            }

            core.info(`\n\n ${issues[0]} \n\n`);

            const labels = issues[0].labels.map(label => label.name);

            if (labels.length > 0) {
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels
              });
            }

            const issueSection = [
              "",
              "---",
              "",
              "## 🔗 Linked issues",
              "",
              ...issues.map(
                issue => `- #${issue.number}`
              )
            ].join("\n");

            // Avoid adding the section multiple times
            if (originalBody.includes("## 🔗 Linked issues")) {
              core.info("Linked issues section already exists");
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: originalBody + issueSection
            });

            core.info(`Added ${issues.length} linked issues`);